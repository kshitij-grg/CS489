name: lab2a build

on:
  push:
    paths:
      - 'lab2/lab2a/**'
      - '.github/workflows/lab2a-build.yml'
  pull_request:
    paths:
      - 'lab2/lab2a/**'
      - '.github/workflows/lab2a-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lab2/lab2a

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify
